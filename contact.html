<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Help Animals By Shamor Johnson</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- THEME TOGGLE -->
<div class="theme-toggle">
    <input type="checkbox" id="themeSwitch">
    <label for="themeSwitch" class="toggle-label">
        <span class="toggle-ball"></span>
    </label>
</div>

<!-- PAGE WRAPPER -->
<div id="page">

<!-- HEADER -->
<header class="site-header">
    <div class="container header-inner">
        <div class="logo">Help Animals By Shamor Johnson</div>
        <nav class="main-nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </div>
</header>

<main>

    <!-- PAGE TITLE -->
    <section class="page-title">
        <div class="container">
            <h1>Contact Us</h1>
            <p>Have questions or want to get involved? Send us a message.</p>
        </div>
    </section>

    <!-- CONTACT FORM SECTION -->
    <section class="contact-section">
        <div class="container">

            <form class="contact-form" action="#" method="post">

                <!-- NAME -->
                <div class="form-group">
                    <label for="name">Name</label>
                    <input id="name" name="name" type="text" required>
                </div>

                <!-- EMAIL -->
                <div class="form-group">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" required>
                </div>

                <!-- SUBJECT -->
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input id="subject" name="subject" type="text" required>
                </div>

                <!-- MESSAGE -->
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" required></textarea>
                </div>

                <!-- SUBMIT BUTTON -->
                <button type="submit">Send Message</button>

            </form>

        </div>
    </section>

</main>

<!-- FOOTER -->
<footer class="site-footer">
    <div class="container">
        <p>© 2024 Help Animals By Shamor Johnson. All rights reserved.</p>
    </div>
</footer>

</div> <!-- END PAGE WRAPPER -->

</body>
</html>
